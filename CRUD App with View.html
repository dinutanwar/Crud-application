<!DOCTYPE html>
<!-- saved from url=(0032)http://127.0.0.1:5500/index.html -->
<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>CRUD App with View</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: linear-gradient(120deg, #ff9a9e, #fad0c4, #a18cd1);
        }

        .container {
            width: 85%;
            margin: 40px auto;
        }

        h2 {
            text-align: center;
            color: white;
        }

        .form-box {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            width: 150px;
        }

        button {
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
        }

        .add { background: #00f2fe; }
        .update { background: #fddb92; }
        .edit { background: #36d1dc; color: white; }
        .delete { background: #ff4b5c; color: white; }
        .view { background: #8e44ad; color: white; }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        th {
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        tr:nth-child(even) {
            background: rgba(255,255,255,0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
        }

        .close {
            background: red;
            color: white;
            padding: 5px 10px;
            border: none;
            margin-top: 10px;
        }

    </style>
</head>

<body>

<div class="container">
    <h2>
    ✨ CRUD App  <br>
    <span style="
        font-size:16px;
        background: rgb(204, 29, 29);
        color: white;
        padding: 5px 10px;
        border-radius: 8px;
        display: inline-block;
        margin-top: 8px;
    ">
        👤 Dinesh |  24CA2024
    </span>
</h2>

    <div class="form-box">
        <input type="number" id="id" placeholder="ID">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="address" placeholder="Address">

        <button class="add" onclick="addUser()">Add</button>
        <button class="update" onclick="updateUser()">Update</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Address</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="data">
        <tr>
            <td>1</td>
            <td>dinu</td>
            <td>palwal</td>
            <td>
                <button class="view" onclick="viewUser(1)">View</button>
                <button class="edit" onclick="editUser(1)">Edit</button>
                <button class="delete" onclick="deleteUser(1)">Delete</button>
            </td>
        </tr>
        
        <tr>
            <td>2</td>
            <td>Lalit</td>
            <td>palwal</td>
            <td>
                <button class="view" onclick="viewUser(2)">View</button>
                <button class="edit" onclick="editUser(2)">Edit</button>
                <button class="delete" onclick="deleteUser(2)">Delete</button>
            </td>
        </tr>
        
        <tr>
            <td>3</td>
            <td>karnal</td>
            <td>Naharjat</td>
            <td>
                <button class="view" onclick="viewUser(3)">View</button>
                <button class="edit" onclick="editUser(3)">Edit</button>
                <button class="delete" onclick="deleteUser(3)">Delete</button>
            </td>
        </tr>
        
        <tr>
            <td>4</td>
            <td>aman</td>
            <td>hodal</td>
            <td>
                <button class="view" onclick="viewUser(4)">View</button>
                <button class="edit" onclick="editUser(4)">Edit</button>
                <button class="delete" onclick="deleteUser(4)">Delete</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>User Details</h3>
        <p id="viewData"></p>
        <button class="close" onclick="closeModal()">Close</button>
    </div>
</div>

<script>

const idField = document.getElementById("id");
const nameField = document.getElementById("name");
const addressField = document.getElementById("address");

function getUsers() {
    return JSON.parse(localStorage.getItem("users")) || [];
}

function saveUsers(users) {
    localStorage.setItem("users", JSON.stringify(users));
}

function displayUsers() {
    const users = getUsers();
    const table = document.getElementById("data");
    table.innerHTML = "";

    users.forEach(user => {
        table.innerHTML += `
        <tr>
            <td>${user.id}</td>
            <td>${user.name}</td>
            <td>${user.address}</td>
            <td>
                <button class="view" onclick="viewUser(${user.id})">View</button>
                <button class="edit" onclick="editUser(${user.id})">Edit</button>
                <button class="delete" onclick="deleteUser(${user.id})">Delete</button>
            </td>
        </tr>
        `;
    });
}

// VIEW
function viewUser(id) {
    const users = getUsers();
    const user = users.find(u => u.id == id);

    document.getElementById("viewData").innerHTML = `
        🆔 ID: ${user.id} <br>
        👤 Name: ${user.name} <br>
        📍 Address: ${user.address}
    `;

    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// ADD
function addUser() {
   idField.value = "";
nameField.value = "";
addressField.value = "";
    if (!id || !name || !address) {
        alert("Fill all fields!");
        return;
    }

    let users = getUsers();
    users.push({ id, name, address });

    saveUsers(users);
    displayUsers();
}

// EDIT
function editUser(id) {
    const users = getUsers();
    const user = users.find(u => u.id == id);

    idField.value = user.id;
    nameField.value = user.name;
    addressField.value = user.address;
}

// UPDATE
function updateUser() {
    const id = idField.value;
    const name = nameField.value;
    const address = addressField.value;

    let users = getUsers();

    users = users.map(u =>
        u.id == id ? { id, name, address } : u
    );

    saveUsers(users);
    displayUsers();
}

// DELETE
function deleteUser(id) {
    let users = getUsers();

    users = users.filter(u => u.id != id);

    saveUsers(users);
    displayUsers();
}

displayUsers();

</script>




</body></html>
